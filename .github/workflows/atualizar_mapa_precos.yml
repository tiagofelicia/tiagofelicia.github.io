name: Atualizar Mapa de Precos

on:
  # Agenda a execução automática
  schedule:
    # === GRUPO 1: Manhã (Todos os dias) ===
    # Horário VERÃO (WEST=UTC+1) -> 14:00 e 19:00 (Local)
    - cron: '00 13 * * *'
    - cron: '00 18 * * *'
    # Horário INVERNO (WET=UTC+0) -> 14:00 e 19:00 (Local)
    #- cron: '00 14 * * *'
    #- cron: '00 19 * * *'
    
  workflow_dispatch:

jobs:
  update-map-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests tzdata

      - name: Run price update script
        run: python scripts/atualizar_mapa_precos.py

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualizar dados mapa de precos europeu"
          file_pattern: "data/mapa_precos/*.json"
