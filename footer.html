<!-- RGPD Cookie Consent Banner -->
<div id="tf-cookie-banner" style="
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    background: #1e293b;
    color: #e2e8f0;
    padding: 16px 24px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    font-family: 'Roboto', sans-serif;
    font-size: 0.88rem;
    line-height: 1.5;
">
    <div style="max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; justify-content: space-between;">
        <div style="flex: 1; min-width: 280px;">
            <strong>🍪 Este site utiliza cookies</strong><br>
            Usamos os cookies para compreender como o site é utilizado e melhorar a sua experiência.
            Nenhum dado pessoal é vendido ou partilhado com terceiros para fins publicitários.
        </div>
        <div style="display: flex; gap: 10px; flex-shrink: 0;">
            <button onclick="tfCookieAccept()" style="
                padding: 10px 24px;
                background: #16a34a;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                font-size: 0.88rem;
                transition: background 0.2s;
            " onmouseover="this.style.background='#15803d'" onmouseout="this.style.background='#16a34a'">Aceitar</button>
            <button onclick="tfCookieReject()" style="
                padding: 10px 24px;
                background: none;
                color: #94a3b8;
                border: 1px solid #475569;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                font-size: 0.88rem;
                transition: all 0.2s;
            " onmouseover="this.style.background='#334155';this.style.color='#e2e8f0'" onmouseout="this.style.background='none';this.style.color='#94a3b8'">Rejeitar</button>
        </div>
    </div>
</div>
<script>
(function() {
    var consent = localStorage.getItem('tf_cookie_consent');
    var showBanner = false;

    if (!consent) {
        showBanner = true;
    } else if (consent !== 'accepted') {
        // Rejeição expira após 24h
        var rejectTime = parseInt(consent);
        if (!rejectTime || Date.now() - rejectTime > 24 * 60 * 60 * 1000) {
            localStorage.removeItem('tf_cookie_consent');
            showBanner = true;
        }
    }

    if (showBanner) {
        var banner = document.getElementById('tf-cookie-banner');
        if (banner) banner.style.display = 'block';
    }

    // Aceitar: permanente
    window.tfCookieAccept = function() {
        localStorage.setItem('tf_cookie_consent', 'accepted');
        document.getElementById('tf-cookie-banner').style.display = 'none';
        if (typeof gtag === 'function') {
            var s = document.createElement('script');
            s.async = true;
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-J4NWP00S4F';
            document.head.appendChild(s);
            gtag('js', new Date());
            gtag('config', 'G-J4NWP00S4F');
        }
    };

    // Rejeitar: guarda timestamp (expira em 24h)
    window.tfCookieReject = function() {
        localStorage.setItem('tf_cookie_consent', String(Date.now()));
        document.getElementById('tf-cookie-banner').style.display = 'none';
    };
})();
</script>
